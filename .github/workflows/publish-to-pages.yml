# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Deploy to GitHub Pages
on:
  push:
    branches: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: write
    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN || secrets.CHECKLIST_BOT_TOKEN || secrets.DISCORD_BOT_TOKEN || secrets.TOKEN }}
      DISCORD_SERVER_ID: ${{ vars.DISCORD_SERVER_ID || secrets.DISCORD_SERVER_ID }}
      CHECKLIST_COMMAND: ${{ vars.CHECKLIST_COMMAND }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Validate workflow inputs
        run: |
          if [ -z "$DISCORD_TOKEN" ]; then
            echo "DISCORD_TOKEN is empty."
            echo "Check repository/org secret names: DISCORD_TOKEN, CHECKLIST_BOT_TOKEN, DISCORD_BOT_TOKEN, TOKEN."
            echo "If this is an Environment secret, attach the job to that environment."
            exit 1
          fi

          if [ -z "$DISCORD_SERVER_ID" ]; then
            echo "DISCORD_SERVER_ID is empty."
            echo "Set it as repo variable DISCORD_SERVER_ID (preferred) or repo secret DISCORD_SERVER_ID."
            exit 1
          fi

          echo "Inputs present. Token length: ${#DISCORD_TOKEN}; Guild string length: ${#DISCORD_SERVER_ID}"

      - name: Generate config with secrets
        run: npm run generate-config

      - name: Configure git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: npm run deploy
